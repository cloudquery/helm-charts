apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-pg-init
spec:
  ttlSecondsAfterFinished: 100
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: pg-init
          image: bitnami/postgresql:17.4.0
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgres-creds
                  key: host
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgres-creds
                  key: port
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgres-creds
                  key: admin-user
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgres-creds
                  key: admin-password
            - name: PGSSLMODE
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgres-creds
                  key: ssl-mode
            - name: TENANT_NAME
              value: "tenant_{{ .Values.tenant.id }}"
            - name: TENANT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgres-creds
                  key: tenant-password
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting tenant initialization..."

              DB_EXISTS=$(psql -tAc "SELECT 1 FROM pg_database WHERE datname='$TENANT_NAME'")
              
              if [ -z "$DB_EXISTS" ]; then
                echo "Creating database $TENANT_NAME..."
                psql postgres CREATE DATABASE $TENANT_NAME;
              fi
              
              # Create tenant user and grant permissions
              echo "Creating user $TENANT_NAME..."
              psql postgres <<EOF
              -- Create user if not exists
              DO \$\$
              BEGIN
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '$TENANT_NAME') THEN
                  CREATE USER $TENANT_NAME WITH PASSWORD '$TENANT_PASSWORD';
                END IF;
              END
              \$\$;
              
              -- Grant permissions
              GRANT CONNECT ON DATABASE $TENANT_NAME TO $TENANT_NAME;
              EOF
              
              # Set up schema permissions
              echo "Setting up schema permissions..."
              psql $TENANT_NAME <<EOF
              -- Ensure public schema exists and set permissions
              CREATE SCHEMA IF NOT EXISTS public;
              GRANT ALL PRIVILEGES ON SCHEMA public TO $TENANT_NAME;
              ALTER DEFAULT PRIVILEGES IN SCHEMA public 
                GRANT ALL PRIVILEGES ON TABLES TO $TENANT_NAME;
              EOF


              echo "Tenant initialization completed!"