# ClickHouse connection details
clickhouse:
  host: ""  # Will be provided during installation
  adminUser: ""
  adminPassword: ""

# PostgreSQL connection
postgres:
  host: ""     # Database host
  port: "5432" # Database port
  user: ""     # Admin username
  password: "" # Admin password
  sslmode: "disable" # SSL mode (use "disable" for local connections, "require" for remote/cloud databases)

# Tenant configuration
tenant:
  id: ""
  clickhousePassword: ""  # Password for tenant's ClickHouse user
  postgresPassword: ""    # Password for tenant's PostgreSQL user

# PostgreSQL initialization job configuration
postgresJob:
  # -- Number of retries before considering a Job as failed
  backoffLimit: 4
  # -- Time to keep completed jobs
  ttlSecondsAfterFinished: 100
  # -- Container image configuration
  image:
    # -- PostgreSQL image repository
    repository: bitnami/postgresql
    # -- PostgreSQL image tag
    tag: 17.4.0
    # -- Image pull policy
    pullPolicy: IfNotPresent
  # -- Resource configuration for PostgreSQL job
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# ClickHouse initialization job configuration
clickhouseJob:
  # -- Number of retries before considering a Job as failed
  backoffLimit: 4
  # -- Time to keep completed jobs
  ttlSecondsAfterFinished: 100
  # -- Container image configuration
  image:
    # -- ClickHouse image repository
    repository: clickhouse
    # -- ClickHouse image tag
    tag: 25.1.5
    # -- Image pull policy
    pullPolicy: IfNotPresent
  # -- Resource configuration for ClickHouse job
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi 